<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒店图片智能精修 - AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="hero-gradient text-white py-8 text-center">
    <h1 class="text-2xl font-bold">🏨 酒店图片智能精修 - AI Pro</h1>
  </div>

  <div class="max-w-4xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
      <h2 class="text-lg font-bold mb-4">选择精修类型</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <button onclick="selectType('bedroom')" class="type-btn p-4 border-2 rounded-xl text-center hover:border-blue-500">
          <div class="text-2xl">🛏️</div><div class="text-sm">客房精修</div>
        </button>
        <button onclick="selectType('wrinkle')" class="type-btn p-4 border-2 rounded-xl text-center hover:border-blue-500">
          <div class="text-2xl">👔</div><div class="text-sm">祛褶皱</div>
        </button>
        <button onclick="selectType('indoor')" class="type-btn p-4 border-2 rounded-xl text-center hover:border-blue-500">
          <div class="text-2xl">🏠</div><div class="text-sm">室内氛围</div>
        </button>
        <button onclick="selectType('facade')" class="type-btn p-4 border-2 rounded-xl text-center hover:border-blue-500">
          <div class="text-2xl">🏛️</div><div class="text-sm">外立面</div>
        </button>
      </div>
    </div>

    <div id="uploadArea" class="bg-white rounded-2xl shadow-lg p-8 text-center border-2 border-dashed hover:border-blue-500 cursor-pointer">
      <div class="text-4xl mb-2">📸</div><p class="text-lg">点击上传图片</p>
      <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleUpload(this.files[0])">
    </div>

    <div id="processArea" class="bg-white rounded-2xl shadow-lg p-6 hidden">
      <h2 class="text-lg font-bold mb-4">⚡ AI 精修中...</h2>
      <div class="grid grid-cols-2 gap-4">
        <div><p class="text-sm text-gray-500 mb-1">原图</p><img id="originalImg" class="w-full rounded-lg"></div>
        <div>
          <p class="text-sm text-gray-500 mb-1">处理中</p>
          <div id="loadingPlaceholder" class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center">
            <span class="text-2xl">⏳</span>
          </div>
          <img id="processedImg" class="w-full rounded-lg hidden">
        </div>
      </div>
      <p id="statusText" class="text-center mt-4 text-gray-600">连接 AI 服务...</p>
    </div>

    <div id="resultArea" class="bg-white rounded-2xl shadow-lg p-6 hidden">
      <h2 class="text-lg font-bold mb-4">✅ 精修完成</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div><p class="text-sm text-gray-500 mb-1">原图</p><img id="resultOriginal" class="w-full rounded-lg"></div>
        <div><p class="text-sm text-gray-500 mb-1">✨ 精修后</p><img id="resultProcessed" class="w-full rounded-lg"></div>
      </div>
      <div class="flex justify-center gap-3">
        <button onclick="location.reload()" class="px-5 py-2 bg-gray-200 rounded-lg">🔄 重新</button>
        <button onclick="download()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium">📥 下载图片</button>
      </div>
    </div>
  </div>

  <script>
    let type = '', originalData = '', processedData = '';
    const API_URL = 'http://localhost:8787';

    function selectType(t) { type = t; document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click(); alert('请选择图片'); }

    function handleUpload(file) {
      const reader = new FileReader();
      reader.onload = e => {
        originalData = e.target.result;
        document.getElementById('originalImg').src = originalData;
        document.getElementById('uploadArea').classList.add('hidden');
        document.getElementById('processArea').classList.remove('hidden');
        processImage();
      };
      reader.readAsDataURL(file);
    }

    async function processImage() {
      const status = document.getElementById('statusText');
      try {
        status.textContent = '📤 上传图片...';
        const response = await fetch(`${API_URL}/api/enhance`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: originalData, type })
        });
        const data = await response.json();
        if (data.success) {
          processedData = Array.isArray(data.result) ? data.result[0] : data.result;
          status.textContent = '✅ 完成！';
          document.getElementById('loadingPlaceholder').classList.add('hidden');
          document.getElementById('processedImg').src = processedData;
          document.getElementById('processedImg').classList.remove('hidden');
          setTimeout(() => {
            document.getElementById('processArea').classList.add('hidden');
            document.getElementById('resultOriginal').src = originalData;
            document.getElementById('resultProcessed').src = processedData;
            document.getElementById('resultArea').classList.remove('hidden');
          }, 1000);
        } else {
          status.textContent = '⚠️ ' + data.error;
        }
      } catch (error) {
        status.textContent = '⚠️ 连接失败，请先启动服务器';
      }
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'hotel-' + type + '-' + Date.now() + '.jpg';
      a.href = processedData;
      a.click();
    }
  </script>
</body>
</html>
